<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Добавить поход в Караван</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; background: var(--tg-theme-bg-color); color: var(--tg-theme-text-color); }
        h1 { text-align: center; margin-bottom: 20px; }
        label { display: block; margin: 15px 0 5px; font-weight: bold; }
        input, select, textarea { width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 8px; border: 1px solid var(--tg-theme-hint-color); background: var(--tg-theme-secondary-bg-color); color: var(--tg-theme-text-color); font-size: 16px; box-sizing: border-box; }
        textarea { height: 120px; resize: vertical; }
        .note { font-size: 14px; color: var(--tg-theme-hint-color); background: var(--tg-theme-secondary-bg-color); padding: 15px; border-radius: 8px; margin: 20px 0; }
        .success { color: #4CAF50; font-weight: bold; text-align: center; margin: 20px 0; display: none; }
    </style>
</head>
<body>
    <h1>Добавить новый поход</h1>
    <div class="note">
        <b>Фото:</b><br>
        • Прикрепи фото (или альбом) прямо в чате после отправки формы.
    </div>
    <div class="success" id="successMessage">✅ Пост отправлен в бот!<br>Теперь ответь на это сообщение фото или текстом.</div>

    <form id="hikeForm">
        <label>Название похода *</label>
        <input type="text" id="title">

        <label>Дата начала *</label>
        <input type="date" id="startDate">

        <label>Число дней</label>
        <input type="number" id="nDays" value="1" min="1">

        <label>Дистанция, км</label>
        <input type="text" id="distance">

        <label>Вид похода</label>
        <select id="kindId">
            <option value="1">КАРАВАН-ПВД</option>
            <option value="4">КАРАВАН-Марафон</option>
            <option value="6">Караван-Прогульщик</option>
            <option value="3">КАРАВАН-Экспедиция</option>
            <option value="5">Спорт-КАРАВАН</option>
            <option value="9">КАРАВАН-Винегрет</option>
        </select>

        <label>Темп</label>
        <select id="tempId">
            <option value="1">Средний темп</option>
            <option value="3">Быстрый темп</option>
            <option value="2">Медленный темп</option>
            <option value="9">Средний комфортный темп</option>
        </select>

        <!-- Единая база руководителей (только один руководитель) -->
        <label>Руководитель (ФИО) *</label>
        <select id="headName" required>
            <option value="">— Выберите руководителя —</option>
        </select>

        <label>Telegram руководителя</label>
        <input type="text" id="headTelegram" readonly>

        <label>Телефон руководителя</label>
        <input type="tel" id="headPhone" readonly>

        <label>Описание похода *</label>
        <textarea id="description"></textarea>

        <label>Место и время встречи</label>
        <textarea id="meetingPoint"></textarea>

        <label>Транспорт (название)</label>
        <input type="text" id="transport">

        <label>Ссылка на расписание транспорта</label>
        <input type="url" id="transportURL">

        <label>Ссылка на трек/карту</label>
        <input type="url" id="trackURL">
    </form>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        // ==================== ЕДИНАЯ БАЗА РУКОВОДИТЕЛЕЙ ====================
        const leaders = [
            { name: "Новиков Александр",     telegram: "@Aleks_Visero",     phone: "+79099685509" },
            { name: "САМОСТОЯТЕЛЬНО",     telegram: "",                phone: "" }
            // Добавляйте новых руководителей сюда ↑
        ];

        // Заполнение списка руководителей
        function populateLeaders() {
            const headSelect = document.getElementById('headName');

            leaders.forEach(leader => {
                const opt = new Option(leader.name, leader.name);
                headSelect.add(opt);
            });
        }

        // Автозаполнение Telegram и телефона при выборе руководителя
        function setupAutoFill() {
            document.getElementById('headName').addEventListener('change', function() {
                const selected = this.value;
                const leader = leaders.find(l => l.name === selected);
                
                document.getElementById('headTelegram').value = leader ? leader.telegram : "";
                document.getElementById('headPhone').value = leader ? leader.phone : "";
            });
        }

        tg.MainButton.text = "Отправить в канал";
        tg.MainButton.color = "#2481cc";
        tg.MainButton.show();
        tg.MainButton.enable();

        function getDaysWord(days) {
            days = parseInt(days);
            if (isNaN(days)) return "дней";
            if (days % 10 === 1 && days % 100 !== 11) return "день";
            if ([2, 3, 4].includes(days % 10) && ![12, 13, 14].includes(days % 100)) return "дня";
            return "дней";
        }

        // Инициализация
        window.onload = function() {
            populateLeaders();
            setupAutoFill();
        };

        tg.MainButton.onClick(async () => {
            tg.MainButton.disable();
            tg.MainButton.text = "Отправка...";

            try {
                const data = {
                    title: document.getElementById('title').value.trim(),
                    startDate: document.getElementById('startDate').value,
                    nDays: parseInt(document.getElementById('nDays').value) || 1,
                    distance: document.getElementById('distance').value.trim(),
                    kindId: document.getElementById('kindId').value,
                    tempId: document.getElementById('tempId').value,
                    headName: document.getElementById('headName').value.trim(),
                    headTelegram: document.getElementById('headTelegram').value.trim(),
                    headPhone: document.getElementById('headPhone').value.trim(),
                    description: document.getElementById('description').value.trim(),
                    meetingPoint: document.getElementById('meetingPoint').value.trim(),
                    transport: document.getElementById('transport').value.trim(),
                    transportURL: document.getElementById('transportURL').value.trim(),
                    trackURL: document.getElementById('trackURL').value.trim(),
                };

                if (!data.title || !data.startDate || !data.description || !data.headName) {
                    tg.showAlert("Заполните обязательные поля:\n• Название\n• Дата начала\n• Описание\n• Руководитель");
                    tg.MainButton.enable();
                    tg.MainButton.text = "Отправить в канал";
                    return;
                }

                const formattedDate = data.startDate 
                    ? new Date(data.startDate).toLocaleDateString('ru-RU', { day: 'numeric', month: 'long', year: 'numeric' })
                    : '';

                const kindTexts = {1: "КАРАВАН-ПВД", 4: "КАРАВАН-Марафон", 6: "Караван-Прогульщик", 3: "КАРАВАН-Экспедиция", 5: "Спорт-КАРАВАН", 9: "КАРАВАН-Винегрет"};
                const tempTexts = {1: "Средний темп", 3: "Быстрый темп", 2: "Медленный темп", 9: "Средний комфортный темп"};

                let text = `🚵‍♂️ <b>${data.title}</b>\n\n`;
                text += `<b>Дата:</b> ${formattedDate}`;
                if (data.nDays > 1) text += ` (${data.nDays} ${getDaysWord(data.nDays)})\n`;
                else text += `\n`;
                if (data.distance) text += `<b>Дистанция:</b> ${data.distance} км\n`;
                text += `<b>Вид:</b> ${kindTexts[data.kindId] || 'Другое'}\n`;
                text += `<b>Темп:</b> ${tempTexts[data.tempId] || 'Средний'}\n`;
                text += `<b>Руководитель:</b> ${data.headName}`;
                if (data.headTelegram) {
                    const tgLink = data.headTelegram.replace(/^@/, '');
                    text += ` (<a href="https://t.me/${tgLink}">${data.headTelegram}</a>)`;
                }
                if (data.headPhone) text += `\n<b>Телефон:</b> ${data.headPhone}`;
                text += `\n\n<b>Описание:</b>\n${data.description}`;
                if (data.meetingPoint) text += `\n\n<b>Встреча:</b>\n${data.meetingPoint}`;
                if (data.transport) {
                    text += `\n\n<b>Транспорт:</b> ${data.transport}`;
                    if (data.transportURL) text += ` (<a href="${data.transportURL}">расписание</a>)`;
                }
                if (data.trackURL) text += `\n\n<b>Трек:</b> <a href="${data.trackURL}">трек</a>`;

                const payload = {
                    text: text,
                    startDate: data.startDate,
                    nDays: data.nDays
                };

                tg.sendData(JSON.stringify(payload));

                document.getElementById('successMessage').style.display = 'block';
                tg.MainButton.text = "✅ Отправлено!";
                tg.MainButton.hide();

                setTimeout(() => tg.close(), 800);

            } catch (err) {
                console.error(err);
                tg.showAlert("Ошибка: " + err.message);
                tg.MainButton.enable();
                tg.MainButton.text = "Отправить в канал";
            }
        });
    </script>
</body>
</html>
